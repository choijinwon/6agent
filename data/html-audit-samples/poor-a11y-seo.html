    <style>
      :root {
        --pad: clamp(0.75rem, 3.5vw, 1.5rem);
        --maxw: min(100%, 40rem);

      html {
        box-sizing: border-box;

      }

        margin: 0 auto;
        padding: var(--pad);

    <header>

      <p>
        페이지마다 하나의 큰 제목(H1), 그 아래 섹션은 H2로 구분했습니다. 메타 태그는 검색 결과와 카드 형태 미리보기에

          본 단락은 검색 크롤러가 주제 문맥을 읽기 쉽게 하는 짧은 설명 역할을 합니다. 사용자가 줄였다 펼치는 레이아웃에서도

            width="80"
            height="80"
            decoding="async"
            loading="lazy"
          />
          <figcaption>이미지에 의미 있는 대체 텍스트와 가로세로 크기를 지정해 레이아웃 이동을 줄였습니다.</figcaption>
